services:
  - type: web
    name: face-recognition-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SIMILARITY_THRESHOLD
        value: "0.70"
      - key: FACE_DETECTION_CONFIDENCE_THRESHOLD
        value: "0.90"
      - key: MIN_FACE_BOX_SIZE
        value: "40"
      - key: SECONDARY_DETECTION_SCALE
        value: "1.6"
      - key: DETECTION_MERGE_IOU_THRESHOLD
        value: "0.35"
